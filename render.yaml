# Render Blueprint â€” free-tier stack for DFIR-Lab API
# Docs: https://render.com/docs/blueprint-spec
#
# Free tier: API only (no Redis/Celery). File scans run in background threads.
# Local Docker uses docker-compose.yml with Redis + Celery enabled.

databases:
  - name: DFIR-Lab-db
    databaseName: DFIR-Lab
    user: DFIR-Lab
    plan: free

services:
  - type: web
    name: DFIR-Lab-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: DFIR-Lab-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: RENDER_POSTGRES_REGION
        sync: false
      - key: ENABLE_CELERY_WORKER
        value: "false"
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1,*.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
