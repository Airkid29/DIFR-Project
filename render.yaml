# Render Blueprint — free-tier stack for ForensiGuard API
# Docs: https://render.com/docs/blueprint-spec
#
# Free tier: API only (no Redis/Celery). File scans run in background threads.
# Local Docker uses docker-compose.yml with Redis + Celery enabled.

databases:
  - name: forensiguard-db
    databaseName: forensiguard
    user: forensiguard
    plan: free
    region: oregon

services:
  - type: web
    name: forensiguard-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: forensiguard-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: RENDER_POSTGRES_REGION
        value: oregon
      - key: ENABLE_CELERY_WORKER
        value: "false"
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
